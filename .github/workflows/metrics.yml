name: Metrics

on:
  # Run automatically once a day
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab (use this for the FIRST run)
  workflow_dispatch:
  # Also run on push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # ---- Main stats card: activity, repos, languages, 3D contribution calendar ----
      - name: Generate metrics (stats + languages)
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: muhammadshehzaib
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          # Top languages
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          # 3D contribution calendar (nice visual)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ---- Separate achievements card ----
      - name: Generate metrics (achievements)
        uses: lowlighter/metrics@latest
        with:
          filename: github-achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: muhammadshehzaib
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: no
          plugin_achievements_threshold: C
